<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云散星繁的个人主页</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f4f6f9; display: flex; justify-content: center;
            padding: 40px 20px; min-height: 100vh;
        }

        .card {
            max-width: 700px; width: 100%; background: white;
            border-radius: 20px; padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center;
            position: relative; margin-bottom: 80px;
        }
        .avatar {
            width: 120px; height: 120px; border-radius: 50%;
            background: #e0e0e0; margin: 0 auto 20px; object-fit: cover;
            display: block; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { font-size: 28px; color: #1f2937; margin-bottom: 6px; font-weight: 700; }
        .title { color: #6b7280; font-size: 16px; margin-bottom: 20px; font-weight: 500; }
        .bio { color: #4b5563; line-height: 1.7; margin-bottom: 30px; font-size: 15px; }

        .links { margin-bottom: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .links a {
            color: #3b82f6; text-decoration: none; font-weight: 500;
            font-size: 15px; padding: 6px 10px; border-radius: 6px;
            transition: background 0.2s;
        }
        .links a:hover { background: #eff6ff; text-decoration: underline; }

        .interests-section { margin-top: 30px; text-align: left; }
        .interests-section h2 {
            font-size: 20px; margin-bottom: 16px;
            border-bottom: 2px solid #f3f4f6; padding-bottom: 12px; color: #1f2937;
        }
        .interest-group { margin-bottom: 30px; }
        .interest-group-title {
            font-size: 16px; font-weight: 600; color: #374151;
            margin-bottom: 12px; padding-left: 4px;
        }
        .interest-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .interest-card {
            display: block; background: #f9fafb; border-radius: 12px;
            overflow: hidden; text-decoration: none; border: 1px solid #f3f4f6;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .interest-card:hover {
            transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.06);
        }
        .interest-card img {
            width: 100%; height: 140px; object-fit: cover;
            display: block; background: #eee;
        }
        .interest-card-title {
            display: block; padding: 12px 10px; text-align: center;
            color: #1f2937; font-size: 14px; font-weight: 500;
            word-break: break-word;
        }

        .footer { margin-top: 30px; font-size: 14px; color: #9ca3af; border-top: 1px solid #f3f4f6; padding-top: 20px; }

        /* 管理入口按钮 */
        .admin-fab {
            position: fixed; bottom: 30px; left: 30px;
            width: 48px; height: 48px; border-radius: 50%;
            background: #8b5cf6; color: white; border: none;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
            cursor: pointer; display: none; align-items: center; justify-content: center;
            transition: transform 0.2s; z-index: 100;
        }
        .admin-fab.show { display: flex; }
        .admin-fab:hover { transform: scale(1.08); }

        .settings-fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 56px; height: 56px; border-radius: 50%;
            background: #3b82f6; color: white; border: none;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            cursor: pointer; display: none; align-items: center; justify-content: center;
            transition: transform 0.2s; z-index: 100;
        }
        
        .settings-fab.show {
          display: flex;
        }
        .settings-fab:hover { transform: scale(1.05); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 200;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: white; width: 90%; max-width: 480px;
            border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: translateY(20px); transition: transform 0.3s ease;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-content h2 { font-size: 22px; color: #1f2937; margin-bottom: 20px; text-align: left; }

        .setting-group { margin-bottom: 18px; text-align: left; }
        .setting-group label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 6px; }
        .setting-group input,
        .setting-group textarea {
            width: 100%; padding: 10px 12px; border: 1px solid #d1d5db;
            border-radius: 8px; font-size: 14px; transition: border-color 0.2s; font-family: inherit;
        }
        .setting-group input:focus,
        .setting-group textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .setting-group textarea { resize: vertical; min-height: 60px; }
        .setting-tip { font-size: 12px; color: #9ca3af; margin-top: 4px; display: block; }
        /* 锁定按钮样式 */
.setting-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.lock-btn {
    background: #f3f4f6;
    border: 1px solid #d1d5db;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
}

.lock-btn:hover {
    background: #e5e7eb;
}

.lock-btn.locked {
    background: #fef3c7;
    border-color: #f59e0b;
    color: #92400e;
}

/* 兴趣条目列表 */
.interests-input-list {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.interest-input-item {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 12px;
    position: relative;
}

.interest-input-item.locked {
    opacity: 0.6;
    pointer-events: none;
    background: #f3f4f6;
}

.interest-input-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.interest-input-title {
    font-size: 13px;
    font-weight: 600;
    color: #374151;
}

.btn-delete-item {
    background: #fee2e2;
    color: #ef4444;
    border: none;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
}

.btn-delete-item:hover {
    background: #fecaca;
}

.interest-input-row {
    margin-bottom: 8px;
}

.interest-input-row label {
    display: block;
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 4px;
}

.interest-input-row input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 13px;
}

.interest-input-row input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.upload-row {
    display: flex;
    gap: 8px;
    margin-top: 6px;
}

.btn-upload-small {
    flex: 1;
    padding: 6px 10px;
    border: 1px dashed #93c5fd;
    background: #eff6ff;
    color: #3b82f6;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
}

.btn-upload-small:hover {
    background: #dbeafe;
}

.btn-add {
    margin-top: 10px;
    width: 100%;
    padding: 8px;
    border: 2px dashed #d1d5db;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #6b7280;
    transition: all 0.2s;
}

.btn-add:hover {
    border-color: #3b82f6;
    color: #3b82f6;
    background: #eff6ff;
}

.image-preview-small {
    width: 60px;
    height: 60px;
    border-radius: 6px;
    object-fit: cover;
    border: 2px solid #e5e7eb;
    margin-top: 6px;
}

        .avatar-upload-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .btn-upload, .btn-clear-avatar {
            flex: 1; min-width: 120px;
            padding: 10px 14px; border-radius: 8px; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: all 0.2s; font-weight: 500;
        }
        .btn-upload { background: #eff6ff; color: #3b82f6; border: 1px dashed #93c5fd; }
        .btn-upload:hover { background: #dbeafe; }
        .btn-clear-avatar { background: #fef2f2; color: #ef4444; border: 1px dashed #fca5a5; }
        .btn-clear-avatar:hover { background: #fee2e2; }

        .crop-modal { z-index: 300; }
        .crop-modal .modal-content { max-width: 600px; padding: 24px; }
        .crop-container {
            width: 100%; height: 400px; max-height: 60vh;
            background: #f3f4f6; border-radius: 12px; overflow: hidden;
            margin-bottom: 16px;
        }
        .crop-container img { display: block; max-width: 100%; }
        .crop-preview-wrap {
            display: flex; align-items: center; gap: 16px;
            padding: 12px; background: #f9fafb; border-radius: 12px;
            margin-bottom: 16px;
        }
        .crop-preview-label { font-size: 13px; color: #6b7280; }
        .crop-preview {
            width: 80px; height: 80px; border-radius: 50%;
            overflow: hidden; border: 2px solid #e5e7eb; background: #fff; flex-shrink: 0;
        }
        .crop-tips { font-size: 12px; color: #9ca3af; margin-top: 4px; }

        .modal-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; flex-wrap: wrap; }
        .btn-cancel, .btn-reset, .btn-init {
            padding: 10px 20px; border: 1px solid #d1d5db; background: white;
            border-radius: 8px; cursor: pointer; font-size: 14px; color: #374151;
        }
        .btn-cancel:hover, .btn-reset:hover, .btn-init:hover { background: #f9fafb; }
        .btn-reset { color: #ef4444; border-color: #fecaca; margin-right: auto; }
        .btn-reset:hover { background: #fef2f2; }
        .btn-init { background: #10b981; color: white; border-color: #10b981; }
        .btn-init:hover { background: #059669; }
        .btn-save {
            padding: 10px 24px; border: none; background: #3b82f6; color: white;
            border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500;
        }
        .btn-save:hover { background: #2563eb; }

        /* 云端状态指示器 */
        .cloud-status {
            position: fixed; top: 20px; right: 20px;
            padding: 8px 16px; border-radius: 20px;
            font-size: 13px; font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 50; display: none;
        }
        .cloud-status.show { display: block; }
        .cloud-status.syncing { background: #fef3c7; color: #92400e; }
        .cloud-status.success { background: #d1fae5; color: #065f46; }
        .cloud-status.error { background: #fee2e2; color: #991b1b; }

        .toast {
            position: fixed; top: 24px; left: 50%;
            transform: translateX(-50%) translateY(-120%);
            padding: 12px 24px; border-radius: 10px;
            color: white; font-size: 14px; font-weight: 500;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.info { background: #3b82f6; }

        .cropper-view-box, .cropper-face { border-radius: 50%; }
        .cropper-view-box { outline: 1px solid #3b82f6; outline-color: rgba(59,130,246,0.75); }

        @media (max-width: 600px) {
            .card { padding: 24px; }
            .settings-fab { bottom: 20px; right: 20px; width: 48px; height: 48px; }
            .admin-fab { bottom: 20px; left: 20px; width: 42px; height: 42px; }
            .interest-list { grid-template-columns: repeat(2, 1fr); }
            .crop-container { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="card" id="app">
        <img class="avatar" id="displayAvatar"
             src="https://placehold.co/120x120/eee/999?text=Avatar"
             alt="头像"
             onerror="this.onerror=null;this.src='https://placehold.co/120x120/eee/999?text=Error'">
        <h1 id="displayName">正在加载</h1>
        <div class="title" id="displayTitle">服务器正在启动</div>
        <div class="bio" id="displayBio">云端服务器正在与本地设备建立通信 请稍候</div>
        <div class="links" id="displayLinks"></div>

        <div class="interests-section">
            <h2>我的兴趣展示</h2>
            <div id="displayInterests"></div>
        </div>

        <div class="footer" id="displayFooter">(C) 2026 你的名字 | 联系邮箱：your@email.com</div>
    </div>

    <!-- 云端状态指示器 -->
    <div class="cloud-status" id="cloudStatus"></div>

    <!-- 管理入口（仅管理员可见） -->
    <button class="admin-fab" id="adminFab" title="进入管理模式" aria-label="管理模式">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
        </svg>
    </button>

    <button class="settings-fab" id="openSettingsBtn" aria-label="打开设置">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <h2 id="modalTitle">自定义设置</h2>

            <div class="setting-group">
                <label>头像</label>
                <input type="url" id="inputAvatar" placeholder="或输入图片网址 https://...">

                    <button type="button" class="btn-upload" id="btnUploadAvatar">📁 上传本地图片</button>

<div class="setting-group">

        喜欢的音乐

        const AVATAR_SIZE = 200;
        const AVATAR_QUALITY = 0.85;

        const defaultConfig = Object.freeze({
            avatar: FALLBACK_AVATAR,
            name: '云端响应中',
            title: '正在等待云端服务器',
            bio: '云端服务器正在与本地设备建立链接 请稍后',
            links: [
                { name: 'GitHub', url: '#' },
                { name: '微博', url: '#' },
                { name: '知乎', url: '#' }
            ],
            interests: {
                music: [{ title: '音乐示例', image: 'https://placehold.co/150x150/ffcccc/333?text=Music', url: '#' }],
                anime: [{ title: '动漫示例', image: 'https://placehold.co/150x150/ccffcc/333?text=Anime', url: '#' }],
                game:  [{ title: '游戏示例', image: 'https://placehold.co/150x150/ccccff/333?text=Game',  url: '#' }]
            },
            footer: '(C) 2026 你的名字 | 联系邮箱：your@email.com'
        });

        // ============ DOM ============
        const $ = id => document.getElementById(id);
        const dom = {
            displayAvatar: $('displayAvatar'),
            displayName:   $('displayName'),
            displayTitle:  $('displayTitle'),
            displayBio:    $('displayBio'),
            displayLinks:  $('displayLinks'),
            displayInterests: $('displayInterests'),
            displayFooter: $('displayFooter'),

            inputAvatar: $('inputAvatar'),
            inputName:   $('inputName'),
            inputTitle:  $('inputTitle'),
            inputBio:    $('inputBio'),
            inputLinks:  $('inputLinks'),
            inputMusic:  $('inputMusic'),
            inputAnime:  $('inputAnime'),
            inputGame:   $('inputGame'),
            inputFooter: $('inputFooter'),

            btnUploadAvatar: $('btnUploadAvatar'),
            btnClearAvatar:  $('btnClearAvatar'),
            fileInput:       $('fileInput'),

            cropModal:    $('cropModal'),
            cropImage:    $('cropImage'),
            cropPreview:  $('cropPreview'),
            cancelCropBtn:$('cancelCropBtn'),
            confirmCropBtn:$('confirmCropBtn'),

            openBtn:  $('openSettingsBtn'),
            closeBtn: $('closeSettingsBtn'),
            saveBtn:  $('saveSettingsBtn'),
            resetBtn: $('resetSettingsBtn'),
            modal:    $('settingsModal'),
            modalTitle: $('modalTitle'),

            adminFab: $('adminFab'),
            adminLoginModal: $('adminLoginModal'),
            adminPasswordInput: $('adminPasswordInput'),
            cancelAdminLoginBtn: $('cancelAdminLoginBtn'),
            confirmAdminLoginBtn: $('confirmAdminLoginBtn'),

            initCloudModal: $('initCloudModal'),
            cancelInitBtn: $('cancelInitBtn'),
            confirmInitBtn: $('confirmInitBtn'),

            cloudStatus: $('cloudStatus')
        };

        // ============ 工具函数 ============
        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function sanitizeUrl(url) {
            if (!url) return '#';
            if (typeof url === 'string' && url.startsWith('data:image/')) return url;
            try {
                const parsed = new URL(url.trim());
                return (parsed.protocol === 'http:' || parsed.protocol === 'https:') ? parsed.href : '#';
            } catch (_) { return '#'; }
        }

        function parseInterests(text) {
            if (!text || !text.trim()) return [];
            return text.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
                const p = line.split('|').map(s => (s || '').trim());
                return { title: p[0] || '未命名', image: p[1] || FALLBACK_IMG, url: p[2] || '#' };
            });
        }
        function interestsToLines(arr) {
            return (arr || []).map(i => `${i.title}|${i.image}|${i.url}`).join('\n');
        }
        function parseLinks(text) {
            if (!text || !text.trim()) return [];
            return text.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
                const p = line.split('|').map(s => (s || '').trim());
                return { name: p[0] || '链接', url: p[1] || '#' };
            });
        }
        function linksToLines(arr) {
            return (arr || []).map(i => `${i.name}|${i.url}`).join('\n');
        }

        function showToast(message, type = 'success', duration = 2000) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            requestAnimationFrame(() => {
                requestAnimationFrame(() => toast.classList.add('show'));
            });
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, duration);
        }

        function showCloudStatus(message, type = 'syncing') {
            dom.cloudStatus.textContent = message;
            dom.cloudStatus.className = `cloud-status show ${type}`;
            if (type === 'success' || type === 'error') {
                setTimeout(() => dom.cloudStatus.classList.remove('show'), 3000);
            }
        }

        // ============ 云端 API ============
        const CloudAPI = {
            async createBin(config) {
                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key':  CONFIG.API_KEY
                    },
                    body: JSON.stringify(config)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || '创建失败');
                return data.metadata.id;
            },

            async readBin() {
                if (!CONFIG.BIN_ID) return null;
                const response = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`, {
                    headers: { 'X-Master-Key':  CONFIG.API_KEY }
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || '读取失败');
                return data.record;
            },

            async updateBin(config) {
                if (!CONFIG.BIN_ID) throw new Error('未初始化云端数据');
                const response = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key':  CONFIG.API_KEY
                    },
                    body: JSON.stringify(config)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || '更新失败');
                return data;
            }
        };

        // ============ 渲染 ============
        let lastRenderedJson = '';
        function renderConfig(config) {
            const json = JSON.stringify(config);
            if (json === lastRenderedJson) return;
            lastRenderedJson = json;

            dom.displayAvatar.src = config.avatar || FALLBACK_AVATAR;
            dom.displayName.textContent = config.name || defaultConfig.name;
            dom.displayTitle.textContent = config.title || defaultConfig.title;
            dom.displayBio.textContent = config.bio || defaultConfig.bio;
            dom.displayFooter.textContent = config.footer || defaultConfig.footer;

            const links = (config.links && config.links.length) ? config.links : defaultConfig.links;
            dom.displayLinks.innerHTML = links.map(link =>
                `<a href="${escapeHtml(sanitizeUrl(link.url))}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.name)}</a>`
            ).join('');

            const interests = config.interests || defaultConfig.interests;
            const categories = [
                { key: 'music', label: '喜欢的音乐' },
                { key: 'anime', label: '喜欢的动漫' },
                { key: 'game',  label: '喜欢的游戏' }
            ];
            let html = '';
            categories.forEach(cat => {
                const items = interests[cat.key] || [];
                if (!items.length) return;
                html += `
                    <div class="interest-group">
                        <div class="interest-group-title">${escapeHtml(cat.label)}</div>
                        <div class="interest-list">
                            ${items.map(item => `
                                <a href="${escapeHtml(sanitizeUrl(item.url))}" target="_blank" rel="noopener noreferrer" class="interest-card">
                                    <img src="${escapeHtml(item.image || FALLBACK_IMG)}" alt="${escapeHtml(item.title)}" loading="lazy"
                                         onerror="this.onerror=null;this.src='${FALLBACK_IMG}'">
                                    <span class="interest-card-title">${escapeHtml(item.title)}</span>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            dom.displayInterests.innerHTML = html || '<p style="color:#9ca3af; text-align:center; padding:20px 0;">暂无数据</p>';
        }

        // ============ 本地存储 ============
        function loadLocalConfig() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) return Object.assign({}, defaultConfig, JSON.parse(stored));
            } catch (e) { console.warn('读取本地失败', e); }
            return Object.assign({}, defaultConfig);
        }
        function saveLocalConfig(config) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
                return true;
            } catch (e) {
                console.error('保存本地失败', e);
                return false;
            }
        }

        // ============ 管理员模式 ============
        let isAdminMode = false;

        function checkAdminMode() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('admin')) {
                dom.adminLoginModal.classList.add('active');
            }
        }

        function enterAdminMode() {
            isAdminMode = true;
            dom.adminFab.classList.add('show');dom.openBtn.classList.add('show');
            dom.modalTitle.textContent = '管理模式 - 自定义设置';
            showToast('已进入管理模式', 'info');
        }

        dom.adminFab.addEventListener('click', () => {
            fillForm(loadLocalConfig());
            dom.inputAvatar.value = dom.displayAvatar.src || '';
            dom.modal.classList.add('active');
        });

        dom.confirmAdminLoginBtn.addEventListener('click', () => {
            const pwd = dom.adminPasswordInput.value;
            if (pwd === CONFIG.ADMIN_PASSWORD) {
                dom.adminLoginModal.classList.remove('active');
                dom.adminPasswordInput.value = '';
                enterAdminMode();

                // 检查是否需要初始化
                if (!CONFIG.BIN_ID) {
                    dom.initCloudModal.classList.add('active');
                } else {
                    // 从云端加载
                    loadFromCloud();
                }
            } else {
                showToast('密码错误', 'error');
            }
        });

        dom.cancelAdminLoginBtn.addEventListener('click', () => {
            dom.adminLoginModal.classList.remove('active');
            dom.adminPasswordInput.value = '';
            // 清除 URL 参数
            history.replaceState(null, '', window.location.pathname);
        });

        // ============ 云端初始化 ============
        dom.confirmInitBtn.addEventListener('click', async () => {
            if (CONFIG.API_KEY === '你的_API_KEY_粘贴在这里') {
                showToast('请先在代码中填写 API_KEY', 'error', 3000);
                return;
            }

            showCloudStatus('正在初始化云端...', 'syncing');
            try {
                const binId = await CloudAPI.createBin(defaultConfig);
                CONFIG.BIN_ID = binId;
                showToast('✓ 云端初始化成功！请将 BIN_ID 填入代码', 'success', 5000);
                alert(`初始化成功！\n\n请将以下 BIN_ID 复制到代码的 CONFIG.BIN_ID 中：\n\n${binId}\n\n然后刷新页面。`);
                dom.initCloudModal.classList.remove('active');
            } catch (e) {
                console.error(e);
                showToast('初始化失败：' + e.message, 'error', 3000);
            }
        });

        dom.cancelInitBtn.addEventListener('click', () => {
            dom.initCloudModal.classList.remove('active');
        });

        // ============ 云端读写 ============
        async function loadFromCloud() {
            if (!CONFIG.BIN_ID) return;
            showCloudStatus('正在从云端同步...', 'syncing');
            try {
                const cloudConfig = await CloudAPI.readBin();
                if (cloudConfig) {
                    const config = Object.assign({}, defaultConfig, cloudConfig);
                    renderConfig(config);
                    dom.inputAvatar.value = config.avatar || '';
                    saveLocalConfig(config); // 缓存到本地
                    showCloudStatus('✓ 云端同步成功', 'success');
                }
            } catch (e) {
                console.error(e);
                showCloudStatus('云端同步失败', 'error');
                // 降级到本地
                renderConfig(loadLocalConfig());
            }
        }

        async function saveToCloud(config) {
            if (!CONFIG.BIN_ID) {
                showToast('未初始化云端，仅保存到本地', 'error');
                return;
            }
            showCloudStatus('正在保存到云端...', 'syncing');
            try {
                await CloudAPI.updateBin(config);
                showCloudStatus('✓ 已保存到云端', 'success');
            } catch (e) {
                console.error(e);
                showCloudStatus('云端保存失败', 'error');
                showToast('云端保存失败：' + e.message, 'error');
            }
        }

        // ============ 弹窗控制 ============
        function fillForm(config) {
            dom.inputAvatar.value = (config.avatar && !config.avatar.startsWith('data:image/')) ? config.avatar : '';
            dom.inputName.value   = config.name   || '';
            dom.inputTitle.value  = config.title  || '';
            dom.inputBio.value    = config.bio    || '';
            dom.inputLinks.value  = linksToLines(config.links);
            fillInterestInputs(config);
            dom.inputFooter.value = config.footer || '';
        }

        function openModal() {
            fillForm(loadLocalConfig());
            dom.modal.classList.add('active');
        }
        function closeModal() { dom.modal.classList.remove('active'); }

        // ============ 头像裁剪 ============
        let cropperInstance = null;

        dom.btnUploadAvatar.addEventListener('click', () => dom.fileInput.click());

        dom.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                dom.fileInput.value = '';
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showToast('图片过大（>10MB）', 'error');
                dom.fileInput.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => openCropModal(ev.target.result);
            reader.onerror = () => showToast('读取文件失败', 'error');
            reader.readAsDataURL(file);
            dom.fileInput.value = '';
        });

        function openCropModal(imageDataUrl) {
            dom.cropImage.src = imageDataUrl;
            dom.cropModal.classList.add('active');
            dom.cropImage.onload = () => {
                if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
                cropperInstance = new Cropper(dom.cropImage, {
                    aspectRatio: 1, viewMode: 1, dragMode: 'move',
                    autoCropArea: 0.85, responsive: true, restore: false,
                    guides: true, center: true, highlight: false,
                    cropBoxMovable: false, cropBoxResizable: false,
                    toggleDragModeOnDblclick: false,
                    preview: dom.cropPreview
                });
            };
        }
        function closeCropModal() {
            dom.cropModal.classList.remove('active');
            if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
            dom.cropImage.src = '';
            dom.cropPreview.innerHTML = '';
        }
        dom.cancelCropBtn.addEventListener('click', closeCropModal);
        dom.confirmCropBtn.addEventListener('click', () => {
            if (!cropperInstance) return;
            const canvas = cropperInstance.getCroppedCanvas({
                width: AVATAR_SIZE, height: AVATAR_SIZE, imageSmoothingQuality: 'high'
            });
            let dataUrl = canvas.toDataURL('image/jpeg', AVATAR_QUALITY);
            const sizeKB = Math.round((dataUrl.length * 3) / 4 / 1024);
            if (sizeKB > 500) dataUrl = canvas.toDataURL('image/jpeg', 0.6);
            dom.inputAvatar.value = dataUrl;
            closeCropModal();
            showToast(`✓ 头像已裁剪（约 ${Math.round((dataUrl.length * 3) / 4 / 1024)}KB）`, 'success');
        });
        dom.btnClearAvatar.addEventListener('click', () => {
            dom.inputAvatar.value = '';
            showToast('头像已清除', 'info');
        });

        // ============ 保存 / 重置 ============
        async function handleSave() {
            const config = {
                avatar: dom.inputAvatar.value.trim() || defaultConfig.avatar,
                name:   dom.inputName.value.trim()   || defaultConfig.name,
                title:  dom.inputTitle.value.trim()  || defaultConfig.title,
                bio:    dom.inputBio.value.trim()    || defaultConfig.bio,
                links:  parseLinks(dom.inputLinks.value),
                interests: collectInterestData(),
                footer: dom.inputFooter.value.trim() || defaultConfig.footer
            };

            // 保存到本地
            if (saveLocalConfig(config)) {
                lastRenderedJson = '';
                renderConfig(config);
                closeModal();
                showToast('✓ 已保存到本地', 'success');

                // 如果是管理模式，同时保存到云端
                if (isAdminMode && CONFIG.BIN_ID) {
                    await saveToCloud(config);
                }
            } else {
                showToast('保存失败', 'error');
            }
        }

        function handleReset() {
            if (!confirm('确定要恢复所有设置为默认值吗？')) return;
            try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
            lastRenderedJson = '';
            renderConfig(defaultConfig);
            fillForm(defaultConfig);
            showToast('已恢复默认设置', 'info');
        }

        // ============ 事件绑定 ============
        dom.openBtn.addEventListener('click', openModal);
        dom.closeBtn.addEventListener('click', closeModal);
        dom.saveBtn.addEventListener('click', handleSave);
        dom.resetBtn.addEventListener('click', handleReset);

        dom.modal.addEventListener('click', e => { if (e.target === dom.modal) closeModal(); });
        dom.cropModal.addEventListener('click', e => { if (e.target === dom.cropModal) closeCropModal(); });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (dom.cropModal.classList.contains('active')) closeCropModal();
                else if (dom.modal.classList.contains('active')) closeModal();
            }
        });

        // ============ 初始化 ============
        checkAdminMode();

        // 普通用户：从云端加载
        if (!isAdminMode && CONFIG.BIN_ID) {
            loadFromCloud();
        } else {
            renderConfig(loadLocalConfig());
        }
        // ========== 兴趣条目管理 (新增) ==========

    // 获取分类中文名
    function getCategoryName(cat) {
        const names = { music: '音乐', anime: '动漫', game: '游戏' };
        return names[cat] || cat;
    }

    // 切换锁定状态 (必须加 window.)
    window.toggleLock = function(category) {
        const btn = $(`lock${category.charAt(0).toUpperCase() + category.slice(1)}`);
        const list = $(`${category}List`);
        const items = list.querySelectorAll('.interest-input-item');
        
        if (btn.classList.contains('locked')) {
            btn.classList.remove('locked');
            btn.textContent = '🔒 锁定';
            items.forEach(item => item.classList.remove('locked'));
            showToast(`已解锁${getCategoryName(category)}编辑`, 'info');
        } else {
            btn.classList.add('locked');
            btn.textContent = '🔓 解锁';
            items.forEach(item => item.classList.add('locked'));
            showToast(`已锁定${getCategoryName(category)}，防止误操作`, 'info');
        }
    };

    // 添加新条目 (必须加 window.)
    window.addInterestItem = function(category) {
        const list = $(`${category}List`);
        const item = document.createElement('div');
        item.className = 'interest-input-item';
        item.dataset.index = list.children.length;
        
        item.innerHTML = `
            <div class="interest-input-header">
                <span class="interest-input-title">${getCategoryName(category)} #${list.children.length + 1}</span>
                <button type="button" class="btn-delete-item" onclick="deleteInterestItem(this, '${category}')">删除</button>
            </div>
            <div class="interest-input-row">
                <label>标题</label>
                <input type="text" class="input-title" placeholder="例如：我的最爱" maxlength="30">
            </div>
            <div class="interest-input-row">
                <label>封面图片</label>
                <input type="url" class="input-image" placeholder="或输入图片网址 https://...">
                <div class="upload-row">
                    <button type="button" class="btn-upload-small" onclick="uploadItemImage(this, '${category}')"> 上传本地图片</button>
                    <button type="button" class="btn-upload-small" onclick="clearItemImage(this)">✕ 清除</button>
                </div>
                <img class="image-preview-small" style="display:none;">
            </div>
            <div class="interest-input-row">
                <label>跳转链接</label>
                <input type="url" class="input-url" placeholder="例如：https://music.163.com/...">
            </div>
        `;
        
        list.appendChild(item);
        showToast(`已添加${getCategoryName(category)}条目`, 'success');
    };

    // 删除条目 (必须加 window.)
    window.deleteInterestItem = function(btn, category) {
        if (!confirm('确定要删除这个条目吗？')) return;
        btn.closest('.interest-input-item').remove();
        renumberItems(category);
    };

    // 重新编号
    function renumberItems(category) {
        const list = $(`${category}List`);
        list.querySelectorAll('.interest-input-item').forEach((item, index) => {
            item.querySelector('.interest-input-title').textContent = `${getCategoryName(category)} #${index + 1}`;
            item.dataset.index = index;
        });
    }

    // 上传图片 (必须加 window.)
    window.uploadItemImage = function(btn, category) {
        const input = btn.closest('.interest-input-row').querySelector('.input-image');
        const preview = btn.closest('.interest-input-row').querySelector('.image-preview-small');
        
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showToast('图片过大（<5MB）', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                input.value = ev.target.result;
                preview.src = ev.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        };
        fileInput.click();
    };

    // 清除图片 (必须加 window.)
    window.clearItemImage = function(btn) {
        const input = btn.closest('.interest-input-row').querySelector('.input-image');
        const preview = btn.closest('.interest-input-row').querySelector('.image-preview-small');
        input.value = '';
        preview.src = '';
        preview.style.display = 'none';
    };

    // 填充表单时渲染兴趣条目
    function fillInterestInputs(config) {
        const interests = config.interests || {};
        
        ['music', 'anime', 'game'].forEach(category => {
            const list = $(`${category}List`);
            list.innerHTML = '';
            
            const items = interests[category] || [];
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'interest-input-item';
                div.dataset.index = index;
                
                const isImageBase64 = item.image && item.image.startsWith('data:image/');
                
                div.innerHTML = `
                    <div class="interest-input-header">
                        <span class="interest-input-title">${getCategoryName(category)} #${index + 1}</span>
                        <button type="button" class="btn-delete-item" onclick="deleteInterestItem(this, '${category}')">删除</button>
                    </div>
                    <div class="interest-input-row">
                        <label>标题</label>
                        <input type="text" class="input-title" value="${escapeHtml(item.title || '')}" maxlength="30">
                    </div>
                    <div class="interest-input-row">
                        <label>封面图片</label>
                        <input type="url" class="input-image" value="${isImageBase64 ? '' : escapeHtml(item.image || '')}" placeholder="或输入图片网址 https://...">
                        <div class="upload-row">
                            <button type="button" class="btn-upload-small" onclick="uploadItemImage(this, '${category}')">📁 上传本地图片</button>
                            <button type="button" class="btn-upload-small" onclick="clearItemImage(this)">✕ 清除</button>
                        </div>
                        <img class="image-preview-small" src="${escapeHtml(item.image || '')}" style="display: ${item.image ? 'block' : 'none'};">
                    </div>
                    <div class="interest-input-row">
                        <label>跳转链接</label>
                        <input type="url" class="input-url" value="${escapeHtml(item.url || '')}" placeholder="例如：https://...">
                    </div>
                `;
                list.appendChild(div);
            });
            
            if (items.length === 0) {
                addInterestItem(category);
            }
        });
    }

    // 保存时收集兴趣条目数据
    function collectInterestData() {
        const interests = {};
        
        ['music', 'anime', 'game'].forEach(category => {
            const list = $(`${category}List`);
            const items = [];
            
            list.querySelectorAll('.interest-input-item').forEach(item => {
                const title = item.querySelector('.input-title').value.trim();
                const image = item.querySelector('.input-image').value.trim();
                const url = item.querySelector('.input-url').value.trim();
                
                if (title || image || url) {
                    items.push({
                        title: title || `${getCategoryName(category)} ${items.length + 1}`,
                        image: image || FALLBACK_IMG,
                        url: url || '#'
                    });
                }
            });
            
            interests[category] = items;
        });
        
        return interests;
    }
    });
    </script>
</body>
</html>
